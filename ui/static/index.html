<!-- index.html — browser interface for B4YC -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B4YC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #c8d6e5;
      font-family: "Courier New", monospace;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Main terminal view ── */
    #main-view {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #header {
      padding: 10px 14px;
      border-bottom: 1px solid #333;
      color: #00ff88;
      font-weight: bold;
      flex-shrink: 0;
    }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #inputRow {
      display: flex;
      align-items: center;
      border-top: 1px solid #333;
      padding: 8px 14px;
      flex-shrink: 0;
    }
    #prompt { color: #00ff88; margin-right: 8px; white-space: nowrap; }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: #c8d6e5;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    /* ── Monitor view ── */
    #monitor-view {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a2e;
      flex-direction: column;
      z-index: 100;
    }
    #monitor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #monitor-title { color: #00ff88; font-weight: bold; }
    #monitor-back {
      color: #3498db;
      cursor: pointer;
      user-select: none;
    }
    #monitor-back:hover { color: #7fdbff; }
    #monitor-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Shared ── */
    .green  { color: #00ff88; }
    .red    { color: #ff4757; }
    .yellow { color: #ffa502; }
    .blue   { color: #3498db; }
    .dim    { color: #636e72; }

    .detail-btn, .connect-btn {
      cursor: pointer;
      user-select: none;
    }
    .detail-btn:hover  { color: #7fdbff; }
    .connect-btn:hover { color: #7fff9a; }

    .detail-panel {
      margin: 1px 0 5px 14px;
      padding-left: 6px;
      border-left: 1px solid #2a2a4a;
      color: #8899aa;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- ── Main terminal view ─────────────────────────────────── -->
  <div id="main-view">
    <div id="header">B4YC - Before You Connect</div>
    <div id="output"></div>
    <div id="inputRow">
      <span id="prompt">b4yc &gt;</span>
      <input id="input" autofocus placeholder="Type a command (try: help)">
    </div>
  </div>

  <!-- ── Monitor overlay ───────────────────────────────────── -->
  <div id="monitor-view">
    <div id="monitor-header">
      <span id="monitor-title">B4YC MONITOR</span>
      <span id="monitor-back" onclick="closeMonitor()">[back]</span>
    </div>
    <div id="monitor-body"></div>
  </div>

// ── Helpers ────────────────────────────────────────────────────────────────

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function printHtml(html, cls) {
  var el = document.createElement("div");
  if (cls) el.className = cls;
  el.innerHTML = html;
  outputEl.appendChild(el);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function print(text, cls) { printHtml(escapeHtml(text), cls); }

function tagSpan(tag) {
  var cls = tag === "known" ? "green" : tag === "hotspot" ? "yellow" : "dim";
  return '<span class="' + cls + '">[' + tag.toUpperCase() + ']</span>';
}

function signalBar(pct) {
  var n = Math.max(0, Math.min(5, Math.round(pct / 20)));
  return "\u2593".repeat(n) + "\u2591".repeat(5 - n);
}

function ouiLookup(mac) {
  if (!mac) return null;
  return OUI[(mac.replace(/:/g, "").substring(0, 6)).toUpperCase()] || null;
}

function channelToBand(ch) {
  var n = parseInt(ch);
  if (isNaN(n)) return "Unknown";
  if (n >= 1  && n <= 14)  return "2.4 GHz";
  if (n >= 32 && n <= 177) return "5 GHz";
  return "Unknown";
}

function signalQuality(pct) {
  if (pct >= 80) return '<span class="green">Excellent</span>';
  if (pct >= 60) return '<span class="green">Good</span>';
  if (pct >= 40) return '<span class="yellow">Fair</span>';
  if (pct >= 20) return '<span class="yellow">Weak</span>';
  return '<span class="red">Very weak</span>';
}

function securityNote(sec) {
  var s = (sec || "").toLowerCase();
  if (s === "open")         return ' <span class="red">— no encryption, all traffic visible nearby</span>';
  if (s.includes("wep"))    return ' <span class="red">— broken standard, avoid connecting</span>';
  if (s.includes("wpa3"))   return ' <span class="green">— latest standard, strong encryption</span>';
  if (s.includes("wpa2"))   return ' <span class="green">— current standard</span>';
  if (s.includes("wpa"))    return ' <span class="yellow">— outdated, has known weaknesses</span>';
  return "";
}

function tagNote(tag) {
  if (tag === "known")   return '<span class="green">KNOWN</span> — you have connected here before';
  if (tag === "hotspot") return '<span class="yellow">HOTSPOT</span> — looks like a mobile hotspot';
  return '<span class="dim">NEW</span> — not in your connection history';
}

function bleAddrType(addr) {
  var first = parseInt((addr || "").split(":")[0], 16);
  if (isNaN(first)) return "Unknown";
  var top2 = (first >>> 6) & 0x03;
  if (top2 === 3) return "Random static";
  if (top2 === 2) return "Random resolvable";
  if (top2 === 1) return "Random non-resolvable";
  return "Public";
}

function fmtSpeed(bps) {
  if (bps >= 1048576) return (bps / 1048576).toFixed(1) + " MB/s";
  if (bps >= 1024)    return (bps / 1024).toFixed(1) + " KB/s";
  return bps + " B/s";
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(2) + " GB";
  if (b >= 1048576)    return (b / 1048576).toFixed(1) + " MB";
  if (b >= 1024)       return (b / 1024).toFixed(1) + " KB";
  return b + " B";
}

function sparkline(values, width) {
  var bars   = "\u2581\u2582\u2583\u2584\u2585\u2586\u2587\u2588";
  var padded = values.slice(-width);
  while (padded.length < width) padded.unshift(0);
  var max = Math.max.apply(null, padded) || 1;
  return padded.map(function(v) {
    return bars[Math.min(7, Math.floor((v / max) * 8))];
  }).join("");
}

// ── Detail panel builders ──────────────────────────────────────────────────

function formatRows(rows) {
  var maxKey = rows.reduce(function(m, r) { return Math.max(m, r[0].length); }, 0);
  return rows.map(function(r, i) {
    var tree = i === rows.length - 1 ? "  \u2514\u2500 " : "  \u251C\u2500 ";
    var key  = (r[0] + ":").padEnd(maxKey + 2);
    return tree + '<span class="dim">' + escapeHtml(key) + "</span>  " + r[1];
  }).join("\n");
}

function buildWifiDetails(n) {
  var vendor = ouiLookup(n.bssid);
  return formatRows([
    ["SSID",     escapeHtml(n.ssid || "(hidden)")],
    ["BSSID",    escapeHtml(n.bssid)],
    ["Vendor",   vendor
                   ? '<span class="green">' + escapeHtml(vendor) + "</span>"
                   : '<span class="dim">Unknown — OUI ' + escapeHtml((n.bssid || "").substring(0, 8)) + "</span>"],
    ["Band",     escapeHtml(channelToBand(n.channel)) + ' <span class="dim">(Ch ' + escapeHtml(String(n.channel)) + ")</span>"],
    ["Signal",   n.signal + "% — " + signalQuality(n.signal)],
    ["Security", escapeHtml(n.security) + securityNote(n.security)],
    ["WPS",      n.wps
                   ? '<span class="yellow">Enabled — has known vulnerabilities (PIN brute-force)</span>'
                   : "Disabled"],
    ["Status",   tagNote(n.tag || "new")],
  ]);
}

function buildBleDetails(d) {
  var addrType = bleAddrType(d.address);
  var isPublic = addrType === "Public";
  var vendor   = isPublic ? ouiLookup(d.address) : null;
  return formatRows([
    ["Name",      escapeHtml(d.name)],
    ["Address",   escapeHtml(d.address)],
    ["Addr type", escapeHtml(addrType) + (isPublic ? "" : ' <span class="dim">— MAC rotates to prevent tracking</span>')],
    ["Vendor",    isPublic
                   ? (vendor
                       ? '<span class="green">' + escapeHtml(vendor) + "</span>"
                       : '<span class="dim">Unknown — OUI ' + escapeHtml((d.address || "").substring(0, 8)) + "</span>")
                   : '<span class="dim">N/A — not derivable from random address</span>'],
    ["Status",    tagNote(d.tag || "new")],
  ]);
}

// ── Row renderers ──────────────────────────────────────────────────────────

function appendPanel(id, html) {
  var el = document.createElement("div");
  el.id = id;
  el.className = "detail-panel";
  el.style.display = "none";
  el.innerHTML = html;
  outputEl.appendChild(el);
}

function printNetworkRow(n) {
  var pid  = "p" + (detailCounter++);
  var wps  = n.wps ? ' <span class="yellow">[WPS]</span>' : "";
  var bar  = signalBar(n.signal);
  var tag  = tagSpan(n.tag || "new");
  var detailBtn  = ' <span class="blue detail-btn" data-panel="' + pid + '">[+]</span>';
  var connectBtn = n.ssid
    ? ' <span class="green connect-btn" data-ssid="' + escapeHtml(n.ssid) + '" data-security="' + escapeHtml(n.security) + '">[connect]</span>'
    : "";
  printHtml(
    "  " + escapeHtml((n.ssid || "(hidden)").substring(0, 26).padEnd(26)) +
    "  " + escapeHtml(n.bssid) +
    "  " + bar + " " + String(n.signal).padStart(3) + "%" +
    "  Ch " + escapeHtml(String(n.channel).padEnd(4)) +
    "  " + escapeHtml(n.security) + wps +
    "  " + tag + detailBtn + connectBtn
  );
  appendPanel(pid, buildWifiDetails(n));
}

function printBleRow(d) {
  var pid = "p" + (detailCounter++);
  var tag = tagSpan(d.tag || "new");
  var btn = ' <span class="blue detail-btn" data-panel="' + pid + '">[+]</span>';
  printHtml(
    "    " + escapeHtml(d.name) +
    "  (" + escapeHtml(d.address) + ")" +
    "  " + tag + btn
  );
  appendPanel(pid, buildBleDetails(d));
}

// ── Click delegation (details + connect) ──────────────────────────────────

outputEl.addEventListener("click", function(e) {
  var btn = e.target;

  if (btn.classList.contains("detail-btn")) {
    var panel = document.getElementById(btn.getAttribute("data-panel"));
    if (!panel) return;
    var open = panel.style.display !== "none";
    panel.style.display = open ? "none" : "block";
    btn.textContent = open ? "[+]" : "[-]";
    outputEl.scrollTop = outputEl.scrollHeight;
    return;
  }

  if (btn.classList.contains("connect-btn")) {
    initiateConnect(
      btn.getAttribute("data-ssid"),
      btn.getAttribute("data-security")
    );
  }
});

// ── Connect flow ───────────────────────────────────────────────────────────

var connectPending = null;

function initiateConnect(ssid, security) {
  if (!ssid) {
    print("  Can't connect to a hidden network — SSID not broadcast.", "red");
    return;
  }
  var isOpen = !security || security.toLowerCase() === "open";
  if (isOpen) {
    doConnect(ssid, null);
  } else {
    connectPending = { ssid: ssid };
    print('  Connecting to "' + ssid + '" (' + security + ') — enter password below:');
    inputEl.type        = "password";
    inputEl.placeholder = "Wi-Fi password  (Enter to connect, Esc to cancel)";
    promptEl.textContent = "password >";
    inputEl.focus();
  }
}

async function doConnect(ssid, password) {
  print('  Connecting to "' + ssid + '"...');
  try {
    var res = await fetch("/api/connect", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ ssid: ssid, password: password || "" }),
    });
    var data = await res.json();
    print("  " + data.message, data.success ? "green" : "red");
  } catch(e) {
    print("  Connection error: " + e.message, "red");
  }
}

function cancelConnect() {
  connectPending         = null;
  inputEl.type           = "text";
  inputEl.value          = "";
  inputEl.placeholder    = "Type a command (try: help)";
  promptEl.textContent   = "b4yc >";
}

// ── Monitor ────────────────────────────────────────────────────────────────

var monitorInterval = null;
var monitorPrev     = null;
var monitorStart    = null;
var rxHistory       = [];
var txHistory       = [];
var rxPeak          = 0;
var txPeak          = 0;

function openMonitor() {
  monitorPrev  = null;
  monitorStart = null;
  rxHistory    = [];
  txHistory    = [];
  rxPeak       = 0;
  txPeak       = 0;

  document.getElementById("monitor-view").style.display = "flex";
  document.getElementById("main-view").style.display    = "none";

  updateMonitor();
  monitorInterval = setInterval(updateMonitor, 1000);
}

function closeMonitor() {
  clearInterval(monitorInterval);
  monitorInterval = null;
  document.getElementById("monitor-view").style.display = "none";
  document.getElementById("main-view").style.display    = "flex";
  inputEl.focus();
}

async function updateMonitor() {
  try {
    var d = await api("/api/traffic");

    var rxSpeed = 0, txSpeed = 0;
    if (monitorPrev) {
      rxSpeed = Math.max(0, d.rx_bytes - monitorPrev.rx_bytes);
      txSpeed = Math.max(0, d.tx_bytes - monitorPrev.tx_bytes);
    }
    monitorPrev = d;

    if (!monitorStart) monitorStart = { rx: d.rx_bytes, tx: d.tx_bytes };

    rxHistory.push(rxSpeed);
    txHistory.push(txSpeed);
    if (rxHistory.length > 60) rxHistory.shift();
    if (txHistory.length > 60) txHistory.shift();

    if (rxSpeed > rxPeak) rxPeak = rxSpeed;
    if (txSpeed > txPeak) txPeak = txSpeed;

    renderMonitor(d, rxSpeed, txSpeed,
                  d.rx_bytes - monitorStart.rx,
                  d.tx_bytes - monitorStart.tx);
  } catch(e) { /* keep trying */ }
}

function renderMonitor(d, rxSpeed, txSpeed, rxTotal, txTotal) {
  var sep  = "  " + "\u2500".repeat(62);
  var ssidStr = d.ssid
    ? '<span class="green">' + escapeHtml(d.ssid) + "</span>"
    : '<span class="dim">not connected</span>';
  var ipStr = d.ip
    ? '<span class="green">' + escapeHtml(d.ip) + "</span>"
    : '<span class="dim">no IP assigned</span>';

  var rxSpark = sparkline(rxHistory, 60);
  var txSpark = sparkline(txHistory, 60);

  document.getElementById("monitor-body").innerHTML = [
    "",
    "  <span class=\"dim\">Interface:</span>  " + escapeHtml(d.interface || "\u2014") +
      "    <span class=\"dim\">SSID:</span>  " + ssidStr,
    "  <span class=\"dim\">IP Address:</span> " + ipStr,
    "",
    sep,
    "",
    "  <span class=\"green\">\u2193 Download</span>" +
      "   " + fmtSpeed(rxSpeed).padEnd(12) +
      "   peak: " + fmtSpeed(rxPeak).padEnd(12) +
      "   session: " + fmtBytes(rxTotal),
    "",
    "  <span class=\"dim\">  " + escapeHtml(rxSpark) + "</span>",
    "",
    sep,
    "",
    "  <span class=\"yellow\">\u2191 Upload  </span>" +
      "   " + fmtSpeed(txSpeed).padEnd(12) +
      "   peak: " + fmtSpeed(txPeak).padEnd(12) +
      "   session: " + fmtBytes(txTotal),
    "",
    "  <span class=\"dim\">  " + escapeHtml(txSpark) + "</span>",
    "",
    sep,
    "  <span class=\"dim\">Updates every second.  Press Esc or click [back] to return.</span>",
  ].join("\n");
}

// ── API ────────────────────────────────────────────────────────────────────

async function api(endpoint) {
  var res = await fetch(endpoint);
  return await res.json();
}

// ── Command handler ────────────────────────────────────────────────────────

async function runCommand(raw) {
  var parts = raw.trim().split(/\s+/);
  var cmd = (parts[0] || "").toLowerCase();
  var arg = parts.slice(1).join(" ");
  if (!cmd) return;

  print("b4yc > " + raw, "dim");

  if (cmd === "help") {
    print("");
    print("  Commands:", "blue");
    print("  scan              See nearby Wi-Fi networks");
    print("  ble               See nearby Bluetooth devices");
    print("  anomalies         Check for anything suspicious");
    print("  summary           Plain-English overview of your area");
    print("  explain <name>    Learn more about a specific network");
    print("  monitor           Live traffic monitor");
    print("  clear             Clear the screen");
    print("  help              You're looking at it");
    print("");
    print("  Tags:", "blue");
    printHtml('  ' + tagSpan("known")   + '   previously connected');
    printHtml('  ' + tagSpan("hotspot") + ' looks like a mobile hotspot');
    printHtml('  ' + tagSpan("new")     + '     not seen before');
    printHtml('  <span class="blue">[+]</span>           click to expand details');
    printHtml('  <span class="green">[connect]</span>     click to connect');
    print("");
    return;
  }

  if (cmd === "clear") { outputEl.innerHTML = ""; return; }

  if (cmd === "monitor") { openMonitor(); return; }

  if (cmd === "scan") {
    print("  Scanning for Wi-Fi networks...");
    try {
      var data = await api("/api/scan");
      if (data.length === 0) { print("  No Wi-Fi networks found nearby."); return; }
      print("");
      data.forEach(printNetworkRow);
      printHtml('\n  <span class="green">' + data.length + " network(s) found.</span>");
    } catch(e) { print("  Something went wrong: " + e.message, "red"); }
    return;
  }

  if (cmd === "ble") {
    print("  Listening for Bluetooth devices (" + bleScanSeconds + "s)...");
    try {
      var data = await api("/api/ble");
      print("");
      if (data.devices.length === 0) { print("  No Bluetooth devices found."); return; }
      data.devices.forEach(printBleRow);
      print("");
      print(data.summary);
    } catch(e) { print("  Something went wrong: " + e.message, "red"); }
    return;
  }

  if (cmd === "anomalies") {
    print("  Checking for anomalies...");
    try {
      var data = await api("/api/anomalies");
      if (data.anomalies.length === 0) {
        print("\n  Nothing suspicious found. Looks good from here.", "green");
        return;
      }
      print("");
      data.anomalies.forEach(function(a) {
        var cls = a.severity === "high" ? "red" : a.severity === "medium" ? "yellow" : "blue";
        printHtml('<span class="' + cls + '">  [' + a.severity.toUpperCase() + '] ' + escapeHtml(a.message) + '</span>');
      });
    } catch(e) { print("  Something went wrong: " + e.message, "red"); }
    return;
  }

  if (cmd === "summary") {
    print("  Scanning and analyzing...");
    try {
      var data = await api("/api/summary");
      print("\n" + data.summary);
    } catch(e) { print("  Something went wrong: " + e.message, "red"); }
    return;
  }

  if (cmd === "explain") {
    if (!arg) { print("  Which network? Example: explain CoffeeShopWifi"); return; }
    print("  Looking up \"" + arg + "\"...");
    try {
      var data = await api("/api/explain?ssid=" + encodeURIComponent(arg));
      print("\n" + data.explanation);
    } catch(e) { print("  Something went wrong: " + e.message, "red"); }
    return;
  }

  print("  Don't know \"" + cmd + "\". Type \"help\" to see what's available.");
}

// ── Input handling ─────────────────────────────────────────────────────────

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    if (connectPending) { cancelConnect(); print("  Cancelled.", "dim"); }
    return;
  }

  if (e.key === "Enter") {
    if (connectPending) {
      var pw   = inputEl.value;
      var ssid = connectPending.ssid;
      cancelConnect();
      doConnect(ssid, pw);
    } else {
      runCommand(inputEl.value);
      inputEl.value = "";
    }
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && monitorInterval) closeMonitor();
});

// ── Boot ───────────────────────────────────────────────────────────────────

fetch("/api/version")
  .then(function(r) { return r.json(); })
  .then(function(d) {
    bleScanSeconds = d.bleScanSeconds || 10;
    document.getElementById("header").textContent = d.app;
    print("  " + d.app + "  v" + d.version, "green");
    print("  Know what's around you before you go online.");
    print("");
    print("  Type \"help\" for commands.");
    print("");
  })
  .catch(function() {
    print("  B4YC - Before You Connect", "green");
    print("  Know what's around you before you go online.");
    print("");
    print("  Type \"help\" for commands.");
    print("");
  });
</script>
