<!-- index.html — browser interface for B4YC -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B4YC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #c8d6e5;
      font-family: "Courier New", monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      padding: 10px 14px;
      border-bottom: 1px solid #333;
      color: #00ff88;
      font-weight: bold;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header-version { color: #636e72; font-size: 12px; }

    /* ── Tabs ── */
    #tab-bar {
      display: flex;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      background: #12122a;
    }
    .tab {
      padding: 8px 18px;
      cursor: pointer;
      color: #636e72;
      border-bottom: 2px solid transparent;
      user-select: none;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab:hover { color: #c8d6e5; }
    .tab.active {
      color: #00ff88;
      border-bottom-color: #00ff88;
    }

    /* ── Panes ── */
    #pane-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pane {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .pane.active { display: flex; }

    .pane-toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn {
      background: #12122a;
      color: #00ff88;
      border: 1px solid #00ff88;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #00ff88; color: #1a1a2e; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:disabled:hover { background: #12122a; color: #00ff88; }

    .btn-blue {
      color: #3498db;
      border-color: #3498db;
    }
    .btn-blue:hover { background: #3498db; color: #1a1a2e; }

    .explain-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #explain-input {
      background: transparent;
      border: 1px solid #444;
      color: #c8d6e5;
      font-family: inherit;
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
      width: 220px;
    }
    #explain-input:focus { border-color: #3498db; }

    .pane-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-line {
      font-size: 12px;
      color: #636e72;
      padding-left: 4px;
    }

    /* ── Monitor pane ── */
    #monitor-live {
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #monitor-log-wrap {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #monitor-log-header {
      padding: 6px 14px;
      color: #636e72;
      font-size: 12px;
      border-bottom: 1px solid #1e1e3a;
      flex-shrink: 0;
    }
    #monitor-log {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 8px;
    }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .log-table th {
      text-align: left;
      color: #636e72;
      padding: 4px 8px 4px 0;
      border-bottom: 1px solid #222;
      font-weight: normal;
      white-space: nowrap;
    }
    .log-table td {
      padding: 3px 8px 3px 0;
      white-space: nowrap;
      border-bottom: 1px solid #1a1a2e;
    }
    .log-table tr:hover td { background: #1e1e3a; }

    /* ── Shared ── */
    .green  { color: #00ff88; }
    .red    { color: #ff4757; }
    .yellow { color: #ffa502; }
    .blue   { color: #3498db; }
    .dim    { color: #636e72; }

    .detail-btn, .connect-btn {
      cursor: pointer;
      user-select: none;
    }
    .detail-btn:hover  { color: #7fdbff; }
    .connect-btn:hover { color: #7fff9a; }

    .detail-panel {
      margin: 1px 0 5px 14px;
      padding-left: 6px;
      border-left: 1px solid #2a2a4a;
      color: #8899aa;
      font-size: 13px;
    }

    /* ── Password overlay ── */
    #pw-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #pw-overlay.open { display: flex; }
    #pw-box {
      background: #12122a;
      border: 1px solid #333;
      padding: 24px 28px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #pw-title { color: #00ff88; font-weight: bold; }
    #pw-input {
      background: transparent;
      border: 1px solid #444;
      color: #c8d6e5;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 10px;
      outline: none;
      width: 100%;
    }
    #pw-input:focus { border-color: #3498db; }
    #pw-actions { display: flex; gap: 8px; }
  </style>
</head>
<body>

  <div id="header">
    <span id="header-title">B4YC</span>
    <span id="header-version"></span>
    <span id="header-conn" style="margin-left:auto; font-size:12px;"></span>
  </div>

  <div id="tab-bar">
    <span class="tab active" data-tab="wifi">Wi-Fi</span>
    <span class="tab" data-tab="ble">Bluetooth</span>
    <span class="tab" data-tab="anomalies">Anomalies</span>
    <span class="tab" data-tab="summary">Summary</span>
    <span class="tab" data-tab="monitor">Monitor</span>
  </div>

  <div id="pane-container">

    <!-- Wi-Fi -->
    <div class="pane active" id="pane-wifi">
      <div class="pane-toolbar">
        <button class="btn" id="btn-scan" onclick="doScan()">Scan Wi-Fi</button>
        <span class="status-line" id="wifi-status"></span>
      </div>
      <div class="pane-output" id="wifi-output"></div>
    </div>

    <!-- Bluetooth -->
    <div class="pane" id="pane-ble">
      <div class="pane-toolbar">
        <button class="btn" id="btn-ble" onclick="doBle()">Scan Bluetooth</button>
        <span class="status-line" id="ble-status"></span>
      </div>
      <div class="pane-output" id="ble-output"></div>
    </div>

    <!-- Anomalies -->
    <div class="pane" id="pane-anomalies">
      <div class="pane-toolbar">
        <button class="btn" id="btn-anomalies" onclick="doAnomalies()">Check Anomalies</button>
        <span class="status-line" id="anomalies-status"></span>
      </div>
      <div class="pane-output" id="anomalies-output"></div>
    </div>

    <!-- Summary -->
    <div class="pane" id="pane-summary">
      <div class="pane-toolbar">
        <button class="btn" id="btn-summary" onclick="doSummary()">Generate Summary</button>
        <div class="explain-row">
          <input id="explain-input" type="text" placeholder="Network name...">
          <button class="btn btn-blue" id="btn-explain" onclick="doExplain()">Explain Network</button>
        </div>
        <span class="status-line" id="summary-status"></span>
      </div>
      <div class="pane-output" id="summary-output"></div>
    </div>

    <!-- Monitor -->
    <div class="pane" id="pane-monitor">
      <div class="pane-toolbar">
        <button class="btn btn-blue" id="btn-monitor-toggle" onclick="toggleMonitor()">Stop Monitor</button>
        <span class="status-line" id="monitor-status">Live — updates every second</span>
      </div>
      <div id="monitor-live"></div>
      <div id="monitor-log-wrap">
        <div id="monitor-log-header">Traffic log — last 5 minutes</div>
        <div id="monitor-log"></div>
      </div>
    </div>

  </div>

  <!-- Password prompt overlay -->
  <div id="pw-overlay">
    <div id="pw-box">
      <div id="pw-title">Enter Wi-Fi password</div>
      <div id="pw-ssid" class="dim"></div>
      <input id="pw-input" type="password" placeholder="Password (leave blank if open)">
      <div id="pw-actions">
        <button class="btn" onclick="confirmConnect()">Connect</button>
        <button class="btn btn-blue" onclick="cancelConnect()">Cancel</button>
      </div>
    </div>
  </div>

// ── Tab switching ──────────────────────────────────────────────────────────

var activeTab = "wifi";

document.querySelectorAll(".tab").forEach(function(tab) {
  tab.addEventListener("click", function() {
    switchTab(tab.getAttribute("data-tab"));
  });
});

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(function(t) {
    t.classList.toggle("active", t.getAttribute("data-tab") === name);
  });
  document.querySelectorAll(".pane").forEach(function(p) {
    p.classList.toggle("active", p.id === "pane-" + name);
  });

  var prev = activeTab;
  activeTab = name;

  if (name === "monitor" && prev !== "monitor") {
    startMonitor();
  } else if (name !== "monitor" && prev === "monitor") {
    stopMonitor();
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function appendHtml(container, html, cls) {
  var el = document.createElement("div");
  if (cls) el.className = cls;
  el.innerHTML = html;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function appendText(container, text, cls) {
  appendHtml(container, escapeHtml(text), cls);
}

function clearOutput(id) {
  document.getElementById(id).innerHTML = "";
}

function tagSpan(tag) {
  var cls = tag === "known" ? "green" : tag === "hotspot" ? "yellow" : "dim";
  return '<span class="' + cls + '">[' + tag.toUpperCase() + ']</span>';
}

function signalBar(pct) {
  var n = Math.max(0, Math.min(5, Math.round(pct / 20)));
  return "\u2593".repeat(n) + "\u2591".repeat(5 - n);
}

function ouiLookup(mac) {
  if (!mac) return null;
  return OUI[(mac.replace(/:/g, "").substring(0, 6)).toUpperCase()] || null;
}

function channelToBand(ch) {
  var n = parseInt(ch);
  if (isNaN(n)) return "Unknown";
  if (n >= 1  && n <= 14)  return "2.4 GHz";
  if (n >= 32 && n <= 177) return "5 GHz";
  return "Unknown";
}

function signalQuality(pct) {
  if (pct >= 80) return '<span class="green">Excellent</span>';
  if (pct >= 60) return '<span class="green">Good</span>';
  if (pct >= 40) return '<span class="yellow">Fair</span>';
  if (pct >= 20) return '<span class="yellow">Weak</span>';
  return '<span class="red">Very weak</span>';
}

function securityNote(sec) {
  var s = (sec || "").toLowerCase();
  if (s === "open")         return ' <span class="red">— no encryption</span>';
  if (s.includes("wep"))    return ' <span class="red">— broken, avoid</span>';
  if (s.includes("wpa3"))   return ' <span class="green">— latest standard</span>';
  if (s.includes("wpa2"))   return ' <span class="green">— current standard</span>';
  if (s.includes("wpa"))    return ' <span class="yellow">— outdated</span>';
  return "";
}

function tagNote(tag) {
  if (tag === "known")   return '<span class="green">KNOWN</span> — previously connected';
  if (tag === "hotspot") return '<span class="yellow">HOTSPOT</span> — looks like a mobile hotspot';
  return '<span class="dim">NEW</span> — not in your connection history';
}

function bleAddrType(addr) {
  var first = parseInt((addr || "").split(":")[0], 16);
  if (isNaN(first)) return "Unknown";
  var top2 = (first >>> 6) & 0x03;
  if (top2 === 3) return "Random static";
  if (top2 === 2) return "Random resolvable";
  if (top2 === 1) return "Random non-resolvable";
  return "Public";
}

function fmtSpeed(bps) {
  if (bps >= 1048576) return (bps / 1048576).toFixed(1) + " MB/s";
  if (bps >= 1024)    return (bps / 1024).toFixed(1) + " KB/s";
  return bps + " B/s";
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(2) + " GB";
  if (b >= 1048576)    return (b / 1048576).toFixed(1) + " MB";
  if (b >= 1024)       return (b / 1024).toFixed(1) + " KB";
  return b + " B";
}

function sparkline(values, width) {
  var bars   = "\u2581\u2582\u2583\u2584\u2585\u2586\u2587\u2588";
  var padded = values.slice(-width);
  while (padded.length < width) padded.unshift(0);
  var max = Math.max.apply(null, padded) || 1;
  return padded.map(function(v) {
    return bars[Math.min(7, Math.floor((v / max) * 8))];
  }).join("");
}

function setStatus(id, text, cls) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = "status-line" + (cls ? " " + cls : "");
}

function setBusy(btnId, busy) {
  document.getElementById(btnId).disabled = busy;
}

// ── Detail panels ──────────────────────────────────────────────────────────

function formatRows(rows) {
  var maxKey = rows.reduce(function(m, r) { return Math.max(m, r[0].length); }, 0);
  return rows.map(function(r, i) {
    var tree = i === rows.length - 1 ? "  \u2514\u2500 " : "  \u251C\u2500 ";
    var key  = (r[0] + ":").padEnd(maxKey + 2);
    return tree + '<span class="dim">' + escapeHtml(key) + "</span>  " + r[1];
  }).join("\n");
}

function buildWifiDetails(n) {
  var vendor = ouiLookup(n.bssid);
  return formatRows([
    ["SSID",     escapeHtml(n.ssid || "(hidden)")],
    ["BSSID",    escapeHtml(n.bssid)],
    ["Vendor",   vendor
                   ? '<span class="green">' + escapeHtml(vendor) + "</span>"
                   : '<span class="dim">Unknown — OUI ' + escapeHtml((n.bssid || "").substring(0, 8)) + "</span>"],
    ["Band",     escapeHtml(channelToBand(n.channel)) + ' <span class="dim">(Ch ' + escapeHtml(String(n.channel)) + ")</span>"],
    ["Signal",   n.signal + "% — " + signalQuality(n.signal)],
    ["Security", escapeHtml(n.security) + securityNote(n.security)],
    ["WPS",      n.wps
                   ? '<span class="yellow">Enabled — PIN brute-force vulnerability</span>'
                   : "Disabled"],
    ["Status",   tagNote(n.tag || "new")],
  ]);
}

function buildBleDetails(d) {
  var addrType = bleAddrType(d.address);
  var isPublic = addrType === "Public";
  var vendor   = isPublic ? ouiLookup(d.address) : null;
  return formatRows([
    ["Name",      escapeHtml(d.name)],
    ["Address",   escapeHtml(d.address)],
    ["Addr type", escapeHtml(addrType) + (isPublic ? "" : ' <span class="dim">— MAC rotates to prevent tracking</span>')],
    ["Vendor",    isPublic
                   ? (vendor
                       ? '<span class="green">' + escapeHtml(vendor) + "</span>"
                       : '<span class="dim">Unknown — OUI ' + escapeHtml((d.address || "").substring(0, 8)) + "</span>")
                   : '<span class="dim">N/A — not derivable from random address</span>'],
    ["Status",    tagNote(d.tag || "new")],
  ]);
}

function appendPanel(container, id, html) {
  var el = document.createElement("div");
  el.id = id;
  el.className = "detail-panel";
  el.style.display = "none";
  el.innerHTML = html;
  container.appendChild(el);
}

function printNetworkRow(container, n) {
  var pid  = "p" + (detailCounter++);
  var wps  = n.wps ? ' <span class="yellow">[WPS]</span>' : "";
  var bar  = signalBar(n.signal);
  var tag  = tagSpan(n.tag || "new");
  var detailBtn  = ' <span class="blue detail-btn" data-panel="' + pid + '">[+]</span>';
  var connectBtn = n.ssid
    ? ' <span class="green connect-btn" data-ssid="' + escapeHtml(n.ssid) + '" data-security="' + escapeHtml(n.security) + '">[connect]</span>'
    : "";
  appendHtml(container,
    "  " + escapeHtml((n.ssid || "(hidden)").substring(0, 26).padEnd(26)) +
    "  " + escapeHtml(n.bssid) +
    "  " + bar + " " + String(n.signal).padStart(3) + "%" +
    "  Ch " + escapeHtml(String(n.channel).padEnd(4)) +
    "  " + escapeHtml(n.security) + wps +
    "  " + tag + detailBtn + connectBtn
  );
  appendPanel(container, pid, buildWifiDetails(n));
}

function printBleRow(container, d) {
  var pid = "p" + (detailCounter++);
  var tag = tagSpan(d.tag || "new");
  var btn = ' <span class="blue detail-btn" data-panel="' + pid + '">[+]</span>';
  appendHtml(container,
    "    " + escapeHtml(d.name) +
    "  (" + escapeHtml(d.address) + ")" +
    "  " + tag + btn
  );
  appendPanel(container, pid, buildBleDetails(d));
}

// ── Click delegation ───────────────────────────────────────────────────────

document.getElementById("pane-container").addEventListener("click", function(e) {
  var btn = e.target;

  if (btn.classList.contains("detail-btn")) {
    var panel = document.getElementById(btn.getAttribute("data-panel"));
    if (!panel) return;
    var open = panel.style.display !== "none";
    panel.style.display = open ? "none" : "block";
    btn.textContent = open ? "[+]" : "[-]";
    return;
  }

  if (btn.classList.contains("connect-btn")) {
    initiateConnect(btn.getAttribute("data-ssid"), btn.getAttribute("data-security"));
  }
});

// ── Connect flow ───────────────────────────────────────────────────────────

var connectPendingSsid = null;

function initiateConnect(ssid, security) {
  if (!ssid) {
    setStatus("wifi-status", "Can't connect to hidden network — SSID not broadcast.", "red");
    return;
  }
  var isOpen = !security || security.toLowerCase() === "open";
  if (isOpen) {
    doConnect(ssid, null);
  } else {
    connectPendingSsid = ssid;
    document.getElementById("pw-ssid").textContent = ssid + " (" + security + ")";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-overlay").classList.add("open");
    document.getElementById("pw-input").focus();
  }
}

function confirmConnect() {
  var pw   = document.getElementById("pw-input").value;
  var ssid = connectPendingSsid;
  cancelConnect();
  doConnect(ssid, pw);
}

function cancelConnect() {
  connectPendingSsid = null;
  document.getElementById("pw-overlay").classList.remove("open");
}

document.getElementById("pw-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter")  confirmConnect();
  if (e.key === "Escape") cancelConnect();
});

async function doConnect(ssid, password) {
  setStatus("wifi-status", 'Connecting to "' + ssid + '"...');
  try {
    var res = await fetch("/api/connect", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ ssid: ssid, password: password || "" }),
    });
    var data = await res.json();
    setStatus("wifi-status", data.message, data.success ? "green" : "red");
  } catch(e) {
    setStatus("wifi-status", "Connection error: " + e.message, "red");
  }
}

// ── Wi-Fi scan ─────────────────────────────────────────────────────────────

async function doScan() {
  var out = document.getElementById("wifi-output");
  clearOutput("wifi-output");
  setBusy("btn-scan", true);
  setStatus("wifi-status", "Scanning...");
  try {
    var data = await api("/api/scan");
    if (data.length === 0) {
      setStatus("wifi-status", "No Wi-Fi networks found.");
    } else {
      data.forEach(function(n) { printNetworkRow(out, n); });
      setStatus("wifi-status", data.length + " network(s) found.", "green");
    }
  } catch(e) {
    setStatus("wifi-status", "Error: " + e.message, "red");
  }
  setBusy("btn-scan", false);
}

// ── BLE scan ───────────────────────────────────────────────────────────────

async function doBle() {
  var out = document.getElementById("ble-output");
  clearOutput("ble-output");
  setBusy("btn-ble", true);
  setStatus("ble-status", "Scanning for " + bleScanSeconds + "s...");
  try {
    var data = await api("/api/ble");
    if (data.devices.length === 0) {
      setStatus("ble-status", "No Bluetooth devices found.");
    } else {
      data.devices.forEach(function(d) { printBleRow(out, d); });
      appendText(out, "");
      appendText(out, data.summary);
      setStatus("ble-status", data.devices.length + " device(s) found.", "green");
    }
  } catch(e) {
    setStatus("ble-status", "Error: " + e.message, "red");
  }
  setBusy("btn-ble", false);
}

// ── Anomalies ──────────────────────────────────────────────────────────────

async function doAnomalies() {
  var out = document.getElementById("anomalies-output");
  clearOutput("anomalies-output");
  setBusy("btn-anomalies", true);
  setStatus("anomalies-status", "Scanning...");
  try {
    var data = await api("/api/anomalies");
    if (data.anomalies.length === 0) {
      appendHtml(out, '\n  <span class="green">Nothing suspicious found. Looks good from here.</span>');
      setStatus("anomalies-status", "All clear.", "green");
    } else {
      data.anomalies.forEach(function(a) {
        var cls = a.severity === "high" ? "red" : a.severity === "medium" ? "yellow" : "blue";
        appendHtml(out, '<span class="' + cls + '">  [' + a.severity.toUpperCase() + '] ' + escapeHtml(a.message) + '</span>');
      });
      setStatus("anomalies-status", data.anomalies.length + " anomaly(s) found.", "yellow");
    }
  } catch(e) {
    setStatus("anomalies-status", "Error: " + e.message, "red");
  }
  setBusy("btn-anomalies", false);
}

// ── Summary / Explain ──────────────────────────────────────────────────────

async function doSummary() {
  var out = document.getElementById("summary-output");
  clearOutput("summary-output");
  setBusy("btn-summary", true);
  setStatus("summary-status", "Scanning and analyzing...");
  try {
    var data = await api("/api/summary");
    appendText(out, data.summary);
    setStatus("summary-status", "Done.", "green");
  } catch(e) {
    setStatus("summary-status", "Error: " + e.message, "red");
  }
  setBusy("btn-summary", false);
}

async function doExplain() {
  var name = document.getElementById("explain-input").value.trim();
  if (!name) {
    setStatus("summary-status", "Enter a network name first.", "yellow");
    return;
  }
  var out = document.getElementById("summary-output");
  clearOutput("summary-output");
  setBusy("btn-explain", true);
  setStatus("summary-status", 'Looking up "' + name + '"...');
  try {
    var data = await api("/api/explain?ssid=" + encodeURIComponent(name));
    appendText(out, data.explanation);
    setStatus("summary-status", "Done.", "green");
  } catch(e) {
    setStatus("summary-status", "Error: " + e.message, "red");
  }
  setBusy("btn-explain", false);
}

document.getElementById("explain-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doExplain();
});

// ── Monitor ────────────────────────────────────────────────────────────────

var monitorInterval = null;
var monitorPrev     = null;
var monitorStart    = null;
var rxHistory       = [];
var txHistory       = [];
var rxPeak          = 0;
var txPeak          = 0;

function startMonitor() {
  monitorPrev  = null;
  monitorStart = null;
  rxHistory    = [];
  txHistory    = [];
  rxPeak       = 0;
  txPeak       = 0;
  document.getElementById("btn-monitor-toggle").textContent = "Stop Monitor";
  setStatus("monitor-status", "Live — updates every second");
  updateMonitor();
  monitorInterval = setInterval(updateMonitor, 1000);
  startLogPoller();
}

function stopMonitor() {
  clearInterval(monitorInterval);
  monitorInterval = null;
  stopLogPoller();
  document.getElementById("btn-monitor-toggle").textContent = "Start Monitor";
  setStatus("monitor-status", "Stopped.");
}

function toggleMonitor() {
  if (monitorInterval) {
    stopMonitor();
  } else {
    startMonitor();
  }
}

async function updateMonitor() {
  try {
    var d = await api("/api/traffic");

    var rxSpeed = 0, txSpeed = 0;
    if (monitorPrev) {
      rxSpeed = Math.max(0, d.rx_bytes - monitorPrev.rx_bytes);
      txSpeed = Math.max(0, d.tx_bytes - monitorPrev.tx_bytes);
    }
    monitorPrev = d;

    if (!monitorStart) monitorStart = { rx: d.rx_bytes, tx: d.tx_bytes };

    rxHistory.push(rxSpeed);
    txHistory.push(txSpeed);
    if (rxHistory.length > 60) rxHistory.shift();
    if (txHistory.length > 60) txHistory.shift();

    if (rxSpeed > rxPeak) rxPeak = rxSpeed;
    if (txSpeed > txPeak) txPeak = txSpeed;

    renderMonitor(d, rxSpeed, txSpeed,
                  d.rx_bytes - monitorStart.rx,
                  d.tx_bytes - monitorStart.tx);
  } catch(e) { /* keep trying */ }
}

function renderMonitor(d, rxSpeed, txSpeed, rxTotal, txTotal) {
  var sep     = "  " + "\u2500".repeat(62);
  var ssidStr = d.ssid
    ? '<span class="green">' + escapeHtml(d.ssid) + "</span>"
    : '<span class="dim">not connected</span>';
  var ipStr   = d.ip
    ? '<span class="green">' + escapeHtml(d.ip) + "</span>"
    : '<span class="dim">no IP assigned</span>';

  var rxSpark = sparkline(rxHistory, 60);
  var txSpark = sparkline(txHistory, 60);

  document.getElementById("monitor-live").innerHTML = [
    "",
    "  <span class=\"dim\">Interface:</span>  " + escapeHtml(d.interface || "\u2014") +
      "    <span class=\"dim\">SSID:</span>  " + ssidStr,
    "  <span class=\"dim\">IP Address:</span> " + ipStr,
    "",
    sep,
    "",
    "  <span class=\"green\">\u2193 Download</span>" +
      "   " + fmtSpeed(rxSpeed).padEnd(12) +
      "   peak: " + fmtSpeed(rxPeak).padEnd(12) +
      "   session: " + fmtBytes(rxTotal),
    "",
    "  <span class=\"dim\">  " + escapeHtml(rxSpark) + "</span>",
    "",
    sep,
    "",
    "  <span class=\"yellow\">\u2191 Upload  </span>" +
      "   " + fmtSpeed(txSpeed).padEnd(12) +
      "   peak: " + fmtSpeed(txPeak).padEnd(12) +
      "   session: " + fmtBytes(txTotal),
    "",
    "  <span class=\"dim\">  " + escapeHtml(txSpark) + "</span>",
    "",
    sep,
  ].join("\n");
}

// ── Traffic log ────────────────────────────────────────────────────────────

var logInterval = null;

function startLogPoller() {
  loadTrafficLog();
  logInterval = setInterval(loadTrafficLog, 5000);
}

function stopLogPoller() {
  clearInterval(logInterval);
  logInterval = null;
}

async function loadTrafficLog() {
  try {
    var data = await api("/api/traffic/log?limit=300");
    renderTrafficLog(data.entries, data.started_at);
  } catch(e) { /* silent */ }
}

function renderTrafficLog(entries, startedAt) {
  if (!entries || entries.length === 0) {
    document.getElementById("monitor-log").innerHTML =
      '<span class="dim" style="padding:8px 0;display:block">No data yet.</span>';
    return;
  }

  // Build header label
  var startStr = startedAt
    ? "since " + new Date(startedAt * 1000).toLocaleTimeString()
    : "";
  document.getElementById("monitor-log-header").textContent =
    "Traffic log — " + entries.length + " entries " + startStr;

  // Show newest first
  var rows = entries.slice().reverse();
  var html = '<table class="log-table"><thead><tr>' +
    '<th>Time</th><th>SSID</th><th>Download</th><th>Upload</th>' +
    '</tr></thead><tbody>';

  rows.forEach(function(e) {
    var t    = new Date(e.t * 1000).toLocaleTimeString();
    var ssid = e.ssid
      ? '<span class="green">' + escapeHtml(e.ssid) + '</span>'
      : '<span class="dim">—</span>';
    var rx   = e.rx_bps > 0
      ? '<span class="green">' + escapeHtml(fmtSpeed(e.rx_bps)) + '</span>'
      : '<span class="dim">—</span>';
    var tx   = e.tx_bps > 0
      ? '<span class="yellow">' + escapeHtml(fmtSpeed(e.tx_bps)) + '</span>'
      : '<span class="dim">—</span>';
    html += '<tr><td class="dim">' + escapeHtml(t) + '</td><td>' + ssid +
            '</td><td>' + rx + '</td><td>' + tx + '</td></tr>';
  });

  html += '</tbody></table>';
  document.getElementById("monitor-log").innerHTML = html;
}

// ── API ────────────────────────────────────────────────────────────────────

async function api(endpoint) {
  var res = await fetch(endpoint);
  return await res.json();
}

// ── Connection status ──────────────────────────────────────────────────────

function renderConnStatus(s) {
  var el = document.getElementById("header-conn");
  if (s.connected) {
    el.innerHTML =
      '<span class="green">\u25CF</span> ' +
      '<span class="green">' + escapeHtml(s.ssid) + '</span>' +
      (s.ip ? ' <span class="dim">(' + escapeHtml(s.ip) + ')</span>' : '');
  } else {
    el.innerHTML = '<span class="dim">\u25CB not connected</span>';
  }
}

function pollConnStatus() {
  fetch("/api/status")
    .then(function(r) { return r.json(); })
    .then(renderConnStatus)
    .catch(function() {});
}

// ── Boot ───────────────────────────────────────────────────────────────────

fetch("/api/version")
  .then(function(r) { return r.json(); })
  .then(function(d) {
    bleScanSeconds = d.bleScanSeconds || 10;
    document.getElementById("header-title").textContent = d.app;
    document.getElementById("header-version").textContent = "v" + d.version;
    document.title = d.app;
  })
  .catch(function() {});

// Show connection status immediately, then refresh every 10s
pollConnStatus();
setInterval(pollConnStatus, 10000);
</script>
